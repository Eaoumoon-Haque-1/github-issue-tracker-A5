<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Tailwind and daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Css file -->
    <link rel="stylesheet" href="./style/color.css" />
  </head>
  <body>
    <!-- login page -->

    <section
      class="max-w-[520px] rounded-lg bg-white shadow-[0px_5px_10px_0px_#00000014] m-auto lg: my-44 p-8 space-y-6"
    >
      <div class="text-center">
        <img
          class="mx-auto mb-8"
          src="./assets/github-logo.png"
          alt=""
          srcset=""
        />
        <h2 class="text-2xl font-semibold mb-1">GitHub Issues Tracker</h2>
        <p class="text-[#64748bFF]">Sign in to manage your issues</p>
      </div>
      <div class="space-y-2">
        <label class="font-[500] text-[#1f2937FF]" for="">Username</label>
        <br />
        <input
          id="username-id"
          class="w-full rounded-lg border border-[#e4e4e7] p-4"
          placeholder="Enter Username: admin"
          type="text"
        />
        <br />
        <label class="font-[500] text-[#1f2937FF]" for="">Password</label>
        <br />
        <input
          id="password-id"
          class="w-full rounded-lg border border-[#e4e4e7] p-4"
          type="text"
          placeholder="Enter Password: admin123"
        />
      </div>
      <button id="btn-id" class="btn btn-primary w-full">Sign In</button>
      <div class="flex items-center my-6">
        <div class="flex-grow h-px bg-gray-300"></div>
        <span class="px-3 text-gray-500 text-sm">OR</span>
        <div class="flex-grow h-px bg-gray-300"></div>
      </div>
      <div class="flex items-center gap-1 justify-center">
        <p class="text-sm text-gray-500">Don't have an Account?</p>
        <button onclick="alert('Under Construction. Use default name and pass')" class="btn btn-accent">Sign Up</button>
      </div>
    </section>

    <script src="./script/login.js"></script>
  </body>
</html>
