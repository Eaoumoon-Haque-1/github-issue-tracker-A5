<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Tailwind and daisy -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Css file -->
    <link rel="stylesheet" href="./style/color.css" />
  </head>
  <body>
    <!-- NAvbar start -->
    <div class="navbar bg-base-100 shadow-sm justify-between">
      <div class="flex items-center">
        <img
          class="w-6 lg:w-9"
          src="./assets/github-logo.png"
          alt=""
          srcset=""
        />
        <a class="btn btn-ghost text-xl lg:text-2xl font-semibold"
          >GitHub Issues Tracker</a
        >
      </div>
      <div class="flex gap-2">
        <input
          type="text"
          placeholder="   Search Issues"
          class="input input-bordered w-24 md:w-auto"
        />
        <i
          class="fa-brands fa-sistrix absolute top-[25px] left-298 text-gray-500"
        ></i>

        <div>
          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
    </div>
    <!-- navabr End -->
    <!-- Toggle buttons start-->
    <section
      class="w-10/12 mx-auto shadow-lg flex flex-col mt-10 gap-2 p-4 lg:p-6 space-x-2 lg:mt-16 lg:flex-row"
    >
      <button id="all-btn-id" class="btn btn-primary w-full sm:w-auto">ALL</button>
      <button id="open-btn-id" class="btn-secondary w-full sm:w-auto">Open</button>
      <button id="close-btn-id" class="btn-secondary w-full sm:w-auto">Closed</button>
    </section>
    <!-- Toggle buttons end -->
    <!-- main body start -->
    <section class="w-10/12 mx-auto">
      <section
        class="border border-[#e4e4e7] rounded-lg p-6 mt-4 flex flex-col items-start gap-2 lg:justify-between lg:flex-row"
      >
        <div class="flex items-center gap-2">
          <img class="" src="./assets/Aperture.png" alt="" srcset="" />
          <div class="flex-col justify-start">
            <p class="text-xl lg:text-2xl font-semibold">
              <span id="all-count-id">50</span> Issues
            </p>
            <p class="text-[#64748bFF]">Track and manage your project issues</p>
          </div>
        </div>
        <div class="flex items-center justify-center">
          <p class="w-3 h-3 bg-[#00a96eFF] mr-2 rounded-full"></p>
          <p class="font-[500] text-[#1f2937FF] mr-4">Open</p>
          <p class="w-3 h-3 bg-[#a855f7FF] mr-2 rounded-full"></p>
          <p class="font-[500] text-[#1f2937FF] mr-4">Closed</p>
        </div>
      </section>
      <!-- spinnerloading -->
       <section id="load-id" class="text-center hidden">
            <span  class="loading loading-bars loading-xl "></span>
       </section>
       
      <!-- Card section -->

      <section
        id="all-issues-id"
        class="p-6 grid grid-cols-4 gap-3 bg-[#fbfbfbFF] shadow-md"
      >

      </section>
    </section>

    <!-- main body end -->
    <!-- modal start -->
      <dialog id="wordModal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="modal-info" class="space-y-[10px]"></div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
        </div>
      </div>
    </dialog>
    
    
    <!-- modal end -->

    <script src="./script/home.js"></script>
  </body>
</html>
